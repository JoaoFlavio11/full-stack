version: '3.8'

services:
  postgres:
    image: "bitnami/postgresql:latest"
    ports:
      - "5432:5432"
    environment:
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=postgres
      - POSTGRESQL_DATABASE=rocket-log
    volumes:
      - postgres_data:/bitnami/postgresql

volumes:
  postgres_data:
